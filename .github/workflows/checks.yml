name: Checks

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Install check tools
        shell: pwsh
        run: .\scripts\install-check-tools.ps1 -Install

      - name: Check addon
        shell: pwsh
        run: .\scripts\check.ps1
