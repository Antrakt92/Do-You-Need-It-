name: Retry CurseForge Upload

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  upload:
    # Manual-only recovery path for transient marketplace/API failures. Normal
    # releases still go through the tag-triggered Release workflow.
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Install check tools
        shell: pwsh
        run: .\scripts\install-check-tools.ps1 -Install

      - name: Check addon
        shell: pwsh
        run: .\scripts\check.ps1

      - name: Package addon
        shell: pwsh
        run: .\scripts\package.ps1

      - name: Upload to CurseForge
        shell: pwsh
        env:
          CURSEFORGE_API_TOKEN: ${{ secrets.CURSEFORGE_API_TOKEN }}
        run: .\scripts\upload-curseforge.ps1
